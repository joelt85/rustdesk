name: Generate BetterDesk Installer
on: 
  workflow_dispatch:

jobs:
  generate:
    runs-on: windows-latest
    steps:
      - name: Download Official RustDesk
        run: |
          Invoke-WebRequest -Uri "https://github.com/rustdesk/rustdesk/releases/download/1.3.7/rustdesk-1.3.7-x86_64.exe" -OutFile "rustdesk.exe"

      - name: Rename with Server Details
        shell: pwsh
        run: |
          $HostName = "betterdesk.longdog.pro"
          $SafeKey = "d5V=UqGL0ELlTVwtr8lYeDAye4wHgvU3Vm8PBSuLhrc="
          $FinalName = "BetterDesk-Setup-host=${HostName},key=${SafeKey}.exe"
          Rename-Item "rustdesk.exe" $FinalName
          echo "ARTIFACT_NAME=$FinalName" >> $env:GITHUB_ENV

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: BetterDesk-Client
          path: ${{ env.ARTIFACT_NAME }}
